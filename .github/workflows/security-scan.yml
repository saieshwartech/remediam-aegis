name: remediam-aegis-scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Remediam Aegis Scan
        env:
          SCAN_BASE_URL: ${{ vars.SCAN_BASE_URL }}
          SCAN_OPENAPI_URL: ${{ vars.SCAN_OPENAPI_URL }}
        run: |
          if [ -z "$SCAN_BASE_URL" ]; then
            echo "SCAN_BASE_URL variable is required"
            exit 1
          fi

          python -m core.cli scan \
            --base-url "$SCAN_BASE_URL" \
            ${SCAN_OPENAPI_URL:+--openapi-url "$SCAN_OPENAPI_URL"}

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: remediam-aegis-reports
          path: reports/
